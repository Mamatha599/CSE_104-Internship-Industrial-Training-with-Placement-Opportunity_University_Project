services:
  # Backend Web Service
  - type: web
    name: internship-backend
    env: node
    plan: free
    rootDir: internship-placement-system/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render dashboard
      - key: CLIENT_URL
        sync: false # Set this to your frontend URL later

  # Frontend Static Site
  - type: web
    name: internship-frontend
    env: static
    plan: free
    rootDir: internship-placement-system/frontend
    buildCommand: npm install; npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your backend URL + /api/v1
